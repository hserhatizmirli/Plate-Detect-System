<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Plaka Tanıma Sistemi - Web Kamera</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a1a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            width: 100%;
            background: #14142a;
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 30px;
        }

        @media (max-width: 968px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        .camera-wrapper {
            position: relative;
            background: #0a0a18;
            border-radius: 16px;
            overflow: hidden;
            aspect-ratio: 16/9;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 300px;
        }

        #videoFeed {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        #overlayCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .camera-status {
            position: absolute;
            top: 16px;
            left: 16px;
            background: rgba(0, 0, 0, 0.7);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
        }

        .status-dot.active {
            background: #00ff88;
            box-shadow: 0 0 12px #00ff88;
        }

        .status-dot.inactive {
            background: #ff4444;
            box-shadow: 0 0 12px #ff4444;
        }

        .info-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .plate-card {
            background: linear-gradient(135deg, #1a1a3e, #0d0d2b);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid rgba(100, 100, 255, 0.15);
        }

        .plate-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #6688cc;
            margin-bottom: 8px;
        }

        .plate-number {
            font-size: 42px;
            font-weight: 700;
            font-family: 'Courier New', monospace;
            color: #ffffff;
            text-shadow: 0 0 30px rgba(0, 100, 255, 0.3);
            min-height: 60px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .plate-number .empty {
            color: #445566;
            font-weight: 300;
            font-size: 20px;
        }

        .plate-badge {
            background: rgba(0, 200, 255, 0.15);
            border: 1px solid rgba(0, 200, 255, 0.3);
            padding: 2px 14px;
            border-radius: 20px;
            font-size: 13px;
            color: #88ddff;
        }

        .confidence-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-top: 16px;
        }

        .conf-item {
            background: rgba(255, 255, 255, 0.03);
            padding: 12px 16px;
            border-radius: 12px;
        }

        .conf-item .label {
            font-size: 11px;
            color: #7788aa;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .conf-item .value {
            font-size: 22px;
            font-weight: 600;
            margin-top: 4px;
        }

        .conf-item .value.good {
            color: #44ff88;
        }
        .conf-item .value.medium {
            color: #ffcc44;
        }
        .conf-item .value.low {
            color: #ff6644;
        }

        .conf-bar-bg {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 4px;
            margin-top: 8px;
            overflow: hidden;
        }

        .conf-bar-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.5s ease;
            background: linear-gradient(90deg, #00ccff, #0066ff);
            width: 0%;
        }

        .history-card {
            background: #0f0f26;
            border-radius: 16px;
            padding: 20px;
            flex: 1;
            min-height: 200px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .history-header h3 {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #6688cc;
        }

        .clear-btn {
            background: rgba(255, 60, 60, 0.15);
            border: 1px solid rgba(255, 60, 60, 0.2);
            color: #ff6666;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .clear-btn:hover {
            background: rgba(255, 60, 60, 0.25);
        }

        .history-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .history-list::-webkit-scrollbar {
            width: 4px;
        }
        .history-list::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.02);
        }
        .history-list::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 4px;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        }

        .history-item:last-child {
            border-bottom: none;
        }

        .history-plate {
            font-weight: 600;
            font-family: 'Courier New', monospace;
            color: #aaccff;
            font-size: 18px;
        }

        .history-time {
            font-size: 12px;
            color: #667799;
        }

        .history-empty {
            color: #445566;
            text-align: center;
            padding: 40px 0;
            font-style: italic;
        }

        .controls {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 24px;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            flex: 1;
            min-width: 120px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #0066ff, #0044cc);
            color: #fff;
        }

        .btn-primary:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 30px rgba(0, 100, 255, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }

        .btn-danger {
            background: rgba(255, 60, 60, 0.15);
            color: #ff6666;
            border: 1px solid rgba(255, 60, 60, 0.2);
        }

        .btn-danger:hover {
            background: rgba(255, 60, 60, 0.25);
        }

        .btn-danger:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .btn-success {
            background: rgba(0, 255, 136, 0.12);
            color: #44ff88;
            border: 1px solid rgba(0, 255, 136, 0.15);
        }

        .btn-success:hover {
            background: rgba(0, 255, 136, 0.2);
        }

        .btn-success:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        @media (max-width: 600px) {
            .container {
                padding: 16px;
            }
            .plate-number {
                font-size: 28px;
            }
            .confidence-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="camera-wrapper">
            <video id="videoFeed" autoplay playsinline></video>
            <canvas id="overlayCanvas"></canvas>

            <div class="camera-status">
                <span class="status-dot" id="statusDot"></span>
                <span id="statusText">Kamera başlatılıyor...</span>
            </div>
        </div>

        <div class="info-panel">
            <div class="plate-card">
                <div class="plate-label">🔍 Tespit Edilen Plaka</div>
                <div class="plate-number" id="plateNumber">
                    <span class="empty">Bekleniyor...</span>
                </div>

                <div class="confidence-grid">
                    <div class="conf-item">
                        <div class="label">YOLO Güven</div>
                        <div class="value" id="yoloConf">%0</div>
                        <div class="conf-bar-bg">
                            <div class="conf-bar-fill" id="yoloBar"></div>
                        </div>
                    </div>
                    <div class="conf-item">
                        <div class="label">OCR Güven</div>
                        <div class="value" id="ocrConf">%0</div>
                        <div class="conf-bar-bg">
                            <div class="conf-bar-fill" id="ocrBar"></div>
                        </div>
                    </div>
                </div>

                <div style="margin-top: 12px; font-size: 13px; color: #667799;">
                    🕐 <span id="detectTime">--</span>
                </div>
            </div>

            <div class="controls">
                <button class="btn btn-primary" id="startBtn">▶ Başlat</button>
                <button class="btn btn-danger" id="stopBtn" disabled>⏹ Durdur</button>
                <button class="btn btn-success" id="captureBtn" disabled>📸 Anlık Tespit</button>
            </div>

            <div class="history-card">
                <div class="history-header">
                    <h3>📋 Geçmiş Plakalar</h3>
                    <button class="clear-btn" id="clearHistory">Temizle</button>
                </div>
                <div class="history-list" id="historyList">
                    <div class="history-empty">Henüz plaka tespit edilmedi</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const video = document.getElementById('videoFeed');
        const canvas = document.getElementById('overlayCanvas');
        const ctx = canvas.getContext('2d');

        let stream = null;
        let isRunning = false;
        let detectionInterval = null;
        let processing = false;

        const plateNumber = document.getElementById('plateNumber');
        const yoloConf = document.getElementById('yoloConf');
        const ocrConf = document.getElementById('ocrConf');
        const yoloBar = document.getElementById('yoloBar');
        const ocrBar = document.getElementById('ocrBar');
        const detectTime = document.getElementById('detectTime');
        const historyList = document.getElementById('historyList');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');

        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const captureBtn = document.getElementById('captureBtn');
        const clearBtn = document.getElementById('clearHistory');

        async function startCamera() {
            try {
                if (stream) {
                    stream.getTracks().forEach(track => track.stop());
                    stream = null;
                }

                const constraints = {
                    video: {
                        facingMode: { ideal: 'environment' },
                        width: { min: 320, ideal: 640, max: 1280 },
                        height: { min: 240, ideal: 480, max: 720 }
                    },
                    audio: false
                };

                console.log('📷 Kamera başlatılıyor...');
                stream = await navigator.mediaDevices.getUserMedia(constraints);

                video.srcObject = stream;
                await video.play();

                canvas.width = video.videoWidth || 640;
                canvas.height = video.videoHeight || 480;

                isRunning = true;
                updateStatus(true, 'Kamera aktif ✅');

                startBtn.disabled = true;
                stopBtn.disabled = false;
                captureBtn.disabled = false;

                if (detectionInterval) clearInterval(detectionInterval);
                detectionInterval = setInterval(captureAndDetect, 1000);

                setTimeout(captureAndDetect, 500);

                console.log('✅ Kamera başarıyla başlatıldı');

            } catch (err) {
                console.error('❌ Kamera hatası:', err);

                let errorMessage = 'Kameraya erişilemedi! ';
                if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
                    errorMessage += 'Lütfen kamera izni verin ve sayfayı yenileyin.';
                } else if (err.name === 'NotFoundError' || err.name === 'DevicesNotFoundError') {
                    errorMessage += 'Kamera bulunamadı. Lütfen bir kamera bağlayın.';
                } else if (err.name === 'NotReadableError' || err.name === 'TrackStartError') {
                    errorMessage += 'Kamera başka bir uygulama tarafından kullanılıyor olabilir.';
                } else {
                    errorMessage += err.message;
                }

                updateStatus(false, errorMessage);
                alert(errorMessage + '\n\nDetay: ' + err.message);

                startBtn.disabled = false;
                stopBtn.disabled = true;
                captureBtn.disabled = true;
            }
        }

        function stopCamera() {
            if (detectionInterval) {
                clearInterval(detectionInterval);
                detectionInterval = null;
            }
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                stream = null;
            }
            video.srcObject = null;
            isRunning = false;
            processing = false;

            updateStatus(false, 'Kamera durduruldu');

            startBtn.disabled = false;
            stopBtn.disabled = true;
            captureBtn.disabled = true;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            plateNumber.innerHTML = '<span class="empty">Durduruldu</span>';
            yoloConf.textContent = '%0';
            ocrConf.textContent = '%0';
            yoloBar.style.width = '0%';
            ocrBar.style.width = '0%';
            detectTime.textContent = '--';
        }

        async function captureAndDetect() {
            if (!isRunning || processing) return;

            processing = true;
            try {
                const captureCanvas = document.createElement('canvas');
                captureCanvas.width = video.videoWidth || 640;
                captureCanvas.height = video.videoHeight || 480;
                const captureCtx = captureCanvas.getContext('2d');
                captureCtx.drawImage(video, 0, 0, captureCanvas.width, captureCanvas.height);

                const imageData = captureCanvas.toDataURL('image/jpeg', 0.9);

                const response = await fetch('/detect', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image: imageData })
                });

                const result = await response.json();

                if (result.success && result.plate_info) {
                    const info = result.plate_info;
                    plateNumber.innerHTML = `
                        ${info.plate}
                        <span class="plate-badge">Tespit</span>
                    `;
                    yoloConf.textContent = `%${info.yolo_conf}`;
                    ocrConf.textContent = `%${info.ocr_conf}`;
                    yoloBar.style.width = `${Math.min(info.yolo_conf, 100)}%`;
                    ocrBar.style.width = `${Math.min(info.ocr_conf, 100)}%`;
                    detectTime.textContent = info.timestamp;

                    if (result.annotated_image) {
                        const img = new Image();
                        img.onload = () => {
                            ctx.clearRect(0, 0, canvas.width, canvas.height);
                            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        };
                        img.src = `data:image/jpeg;base64,${result.annotated_image}`;
                    }

                    fetchHistory();

                } else {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                }

            } catch (err) {
                console.error('Detection hatası:', err);
            } finally {
                processing = false;
            }
        }

        async function fetchHistory() {
            try {
                const response = await fetch('/history');
                const history = await response.json();

                if (history.length === 0) {
                    historyList.innerHTML = '<div class="history-empty">Henüz plaka tespit edilmedi</div>';
                    return;
                }

                const reversed = history.slice().reverse();
                historyList.innerHTML = reversed.map(item => `
                    <div class="history-item">
                        <span class="history-plate">${item.plate}</span>
                        <span class="history-time">${item.time}</span>
                    </div>
                `).join('');

            } catch (err) {
                console.error('Geçmiş yüklenirken hata:', err);
            }
        }

        function updateStatus(active, text) {
            statusDot.className = `status-dot ${active ? 'active' : 'inactive'}`;
            statusText.textContent = text;
        }

        startBtn.addEventListener('click', startCamera);
        stopBtn.addEventListener('click', stopCamera);

        captureBtn.addEventListener('click', () => {
            if (isRunning) captureAndDetect();
        });

        clearBtn.addEventListener('click', async () => {
            try {
                await fetch('/clear_history', { method: 'POST' });
                fetchHistory();
            } catch (err) {
                console.error('Geçmiş temizlenirken hata:', err);
            }
        });

        fetchHistory();

        setTimeout(startCamera, 500);

        window.addEventListener('resize', () => {
            if (isRunning && video.videoWidth) {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
            }
        });

        console.log('🚗 Plaka Tanıma Sistemi Hazır');
        console.log('📸 Her saniye otomatik tespit yapılacak');
        console.log('🔗 Backend: https://localhost:5000');
    </script>

</body>
</html>
